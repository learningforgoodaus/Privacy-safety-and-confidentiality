overview: `
            <div class="content-header">
                <h1>Active Listening</h1>
                <p class="subtitle">When you listen to a client, you need to do three checks in your head at the same time.</p>
            </div>
            <div class="section-card">
                <h3 style="color: var(--primary);">The 3 Checks</h3>
                <div class="icon-row">
                    <div class="icon-block">
                        <div style="fill: var(--primary); margin-bottom: 8px; display: flex; justify-content: center;">
                            <div style="width: 35px; height: 35px;">${icons.shield}</div>
                        </div>
                        <strong>Safety</strong>
                    </div>
                    
                    <div class="icon-block">
                        <div style="fill: var(--primary); margin-bottom: 8px; display: flex; justify-content: center;">
                            <div style="width: 35px; height: 35px;">${icons.eye}</div>
                        </div>
                        <strong>Privacy</strong>
                    </div>
                    
                    <div class="icon-block">
                        <div style="fill: var(--primary); margin-bottom: 8px; display: flex; justify-content: center;">
                            <div style="width: 35px; height: 35px;">${icons.lock}</div>
                        </div>
                        <strong>Confidentiality</strong>
                    </div>
                </div>
            </div>
            <button onclick="loadContent('safety')" style="background: var(--primary); color: white; border: none; padding: 16px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; font-size: 1rem;">Get Started &rarr;</button>
        `,
